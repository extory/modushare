name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: clients/windows
        run: npm install

      - name: Generate icons from SVG
        working-directory: clients/windows
        run: npx electron-icon-builder --input=assets/icon.svg --output=assets

      - name: Set production server URL
        working-directory: clients/windows
        shell: pwsh
        run: |
          (Get-Content electron/main.ts) `
            -replace "http://localhost:3010", "https://modushare.extory.co" `
          | Set-Content electron/main.ts

      - name: Build TypeScript
        working-directory: clients/windows
        run: npx tsc

      - name: Build Windows installer
        working-directory: clients/windows
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModuShare-Windows
          path: clients/windows/release/*.exe

  # ── macOS .dmg ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: clients/windows
        run: npm install

      - name: Generate icons from SVG
        working-directory: clients/windows
        run: npx electron-icon-builder --input=assets/icon.svg --output=assets

      - name: Set production server URL
        working-directory: clients/windows
        run: |
          sed -i '' 's|http://localhost:3010|https://modushare.extory.co|g' electron/main.ts

      - name: Build TypeScript
        working-directory: clients/windows
        run: npx tsc

      - name: Import Developer ID certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "CSC_LINK not set, skipping certificate import"
            exit 0
          fi
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "ci_keychain_pass" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci_keychain_pass" ci.keychain
          security import /tmp/cert.p12 -k ci.keychain -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "ci_keychain_pass" ci.keychain
          rm /tmp/cert.p12

      - name: Build macOS DMG
        working-directory: clients/windows
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK == '' && 'false' || 'true' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModuShare-macOS
          path: clients/windows/release/*.dmg

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ModuShare-Windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ModuShare-macOS
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
