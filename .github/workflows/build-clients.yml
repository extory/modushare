name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'           # v1.0.0 같은 태그 push 시 빌드 + Release
  workflow_dispatch:    # GitHub UI에서 수동 실행 가능

jobs:
  # ── Windows .exe (nsis installer) ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root workspace deps
        run: npm install --ignore-scripts

      - name: Install client deps
        working-directory: clients/windows
        run: npm install --ignore-scripts

      - name: Generate icons from SVG
        working-directory: clients/windows
        run: npx electron-icon-builder --input=assets/icon.svg --output=assets

      - name: Set production server URL
        working-directory: clients/windows
        shell: pwsh
        run: |
          (Get-Content electron/main.ts) `
            -replace "http://localhost:3010", "https://modushare.extory.co" `
          | Set-Content electron/main.ts

      - name: Build TypeScript
        working-directory: clients/windows
        run: npx tsc

      - name: Build Windows installer
        working-directory: clients/windows
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModuShare-Windows
          path: clients/windows/release/*.exe

  # ── macOS .dmg ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root workspace deps
        run: npm install --ignore-scripts

      - name: Install client deps
        working-directory: clients/windows
        run: npm install --ignore-scripts

      - name: Generate icons from SVG
        working-directory: clients/windows
        run: npx electron-icon-builder --input=assets/icon.svg --output=assets

      - name: Set production server URL
        working-directory: clients/windows
        run: |
          sed -i '' 's|http://localhost:3010|https://modushare.extory.co|g' electron/main.ts

      - name: Build TypeScript
        working-directory: clients/windows
        run: npx tsc

      - name: Build macOS DMG
        working-directory: clients/windows
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModuShare-macOS
          path: clients/windows/release/*.dmg

  # ── GitHub Release에 업로드 (태그 push 시에만) ─────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ModuShare-Windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ModuShare-macOS
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
