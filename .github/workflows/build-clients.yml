name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: clients/windows
        run: npm install

      - name: Set production server URL
        working-directory: clients/windows
        shell: pwsh
        run: |
          (Get-Content electron/main.ts) `
            -replace "http://localhost:3010", "https://modushare.extory.co" `
          | Set-Content electron/main.ts

      - name: Build TypeScript
        working-directory: clients/windows
        run: npx tsc

      # tag push → GitHub Release에 직접 게시 (latest.yml 자동 생성됨 → 자동업데이트 동작)
      # workflow_dispatch(수동 실행) → artifact만 업로드
      - name: Build Windows installer
        working-directory: clients/windows
        shell: pwsh
        run: |
          $publish = if ("${{ github.ref }}" -like "refs/tags/*") { "always" } else { "never" }
          npx electron-builder --win --publish $publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModuShare-Windows
          path: |
            clients/windows/release/*.exe
            clients/windows/release/latest.yml

  # ── macOS .zip ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: clients/windows
        run: npm install

      - name: Set production server URL
        working-directory: clients/windows
        run: |
          sed -i '' 's|http://localhost:3010|https://modushare.extory.co|g' electron/main.ts

      - name: Build TypeScript
        working-directory: clients/windows
        run: npx tsc

      - name: Build macOS ZIP
        working-directory: clients/windows
        run: |
          PUBLISH=${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
          npx electron-builder --mac --publish $PUBLISH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModuShare-macOS
          path: |
            clients/windows/release/*.zip
            clients/windows/release/latest-mac.yml

  # ── GitHub Release (tag push 시에만 실행) ────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ModuShare-Windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ModuShare-macOS
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
