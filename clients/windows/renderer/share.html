<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ModuShare – 공유 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; padding: 1.5rem; color: #1d1d1f; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.25rem; }
    .tabs { display: flex; gap: 4px; margin-bottom: 1rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 8px; }
    .tab { padding: 6px 14px; border-radius: 6px; border: none; background: none; cursor: pointer; font-size: 0.875rem; color: #888; display: flex; align-items: center; gap: 6px; }
    .tab.active { background: #f0f0ff; color: #6366f1; font-weight: 600; }
    .badge { background: #ef4444; color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 0.7rem; display: inline-flex; align-items: center; justify-content: center; }
    .section { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .add-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    .add-row input { flex: 1; padding: 0.5rem 0.625rem; border-radius: 7px; border: 1px solid #d1d1d6; font-size: 0.9rem; outline: none; }
    .add-row input:focus { border-color: #6366f1; }
    .error-msg { font-size: 0.8rem; color: #ef4444; margin-bottom: 0.5rem; display: none; }
    .success-msg { font-size: 0.8rem; color: #22c55e; margin-bottom: 0.5rem; display: none; }
    .hint { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
    .list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
    .item { display: flex; align-items: center; justify-content: space-between; background: #f5f5f7; border-radius: 8px; padding: 0.5rem 0.625rem; }
    .inv-item { display: flex; align-items: center; justify-content: space-between; background: #faf5ff; border-radius: 8px; padding: 0.5rem 0.625rem; border: 1px solid #e9d5ff; }
    .info { display: flex; flex-direction: column; gap: 2px; }
    .name { font-size: 0.875rem; font-weight: 500; }
    .email { font-size: 0.75rem; color: #888; }
    .actions { display: flex; gap: 6px; }
    .empty { font-size: 0.85rem; color: #aaa; text-align: center; padding: 1rem 0; }
    button { padding: 0.5rem 1rem; border-radius: 7px; border: 1px solid #d1d1d6; background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
    button.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
    button.small { padding: 3px 10px; font-size: 0.8rem; }
    button.danger { border-color: #fca5a5; color: #ef4444; }
    button.accept { background: #6366f1; color: #fff; border-color: #6366f1; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <h1>공유 관리</h1>

  <div class="tabs">
    <button class="tab active" data-tab="partners">공유 중</button>
    <button class="tab" data-tab="invite">초대 보내기</button>
    <button class="tab" data-tab="incoming">받은 초대 <span class="badge" id="invBadge" style="display:none"></span></button>
    <button class="tab" data-tab="history">히스토리</button>
  </div>

  <!-- 공유 중 탭 -->
  <div class="tab-content active section" id="tab-partners">
    <ul class="list" id="partnerList">
      <li class="empty" id="partnerEmpty">공유 중인 대상이 없습니다</li>
    </ul>
  </div>

  <!-- 초대 보내기 탭 -->
  <div class="tab-content section" id="tab-invite">
    <div class="add-row">
      <input type="email" id="inviteEmail" placeholder="초대할 이메일 입력" />
      <button class="primary small" id="inviteBtn">초대</button>
    </div>
    <p class="error-msg" id="inviteError"></p>
    <p class="success-msg" id="inviteSuccess"></p>
    <p class="hint">상대방이 수락하면 클립보드가 공유됩니다</p>
  </div>

  <!-- 받은 초대 탭 -->
  <div class="tab-content section" id="tab-incoming">
    <ul class="list" id="invList">
      <li class="empty" id="invEmpty">받은 초대가 없습니다</li>
    </ul>
  </div>

  <!-- 히스토리 탭 -->
  <div class="tab-content section" id="tab-history">
    <p style="font-size:0.8rem;font-weight:600;color:#888;margin-bottom:6px;">보낸 초대</p>
    <ul class="list" id="sentList">
      <li class="empty" id="sentEmpty">보낸 초대가 없습니다</li>
    </ul>
    <p style="font-size:0.8rem;font-weight:600;color:#888;margin:12px 0 6px;">받은 초대</p>
    <ul class="list" id="receivedList">
      <li class="empty" id="receivedEmpty">받은 초대가 없습니다</li>
    </ul>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── 탭 전환 ──
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ── 공유 중 목록 ──
    async function loadPartners() {
      const result = await ipcRenderer.invoke('share:list');
      const list = document.getElementById('partnerList');
      const empty = document.getElementById('partnerEmpty');
      list.querySelectorAll('.item').forEach(el => el.remove());
      const partners = result.partners || [];
      empty.style.display = partners.length === 0 ? 'block' : 'none';
      partners.forEach(p => {
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
          <div class="info">
            <span class="name">${escHtml(p.username)}</span>
            <span class="email">${escHtml(p.email)}</span>
          </div>
          <button class="small danger">제거</button>
        `;
        li.querySelector('button').addEventListener('click', async () => {
          await ipcRenderer.invoke('share:remove', p.userId);
          li.remove();
          if (!list.querySelector('.item')) empty.style.display = 'block';
        });
        list.appendChild(li);
      });
    }

    // ── 받은 초대 목록 ──
    async function loadInvitations() {
      const result = await ipcRenderer.invoke('share:invitations');
      const list = document.getElementById('invList');
      const empty = document.getElementById('invEmpty');
      const badge = document.getElementById('invBadge');
      list.querySelectorAll('.inv-item').forEach(el => el.remove());
      const invs = result.invitations || [];
      empty.style.display = invs.length === 0 ? 'block' : 'none';
      badge.style.display = invs.length > 0 ? 'inline-flex' : 'none';
      badge.textContent = invs.length;
      invs.forEach(inv => {
        const li = document.createElement('li');
        li.className = 'inv-item';
        li.innerHTML = `
          <div class="info">
            <span class="name">${escHtml(inv.fromUsername)}</span>
            <span class="email">${escHtml(inv.fromEmail)}</span>
          </div>
          <div class="actions">
            <button class="small accept accept-btn">수락</button>
            <button class="small reject-btn">거절</button>
          </div>
        `;
        li.querySelector('.accept-btn').addEventListener('click', async () => {
          await ipcRenderer.invoke('share:accept', inv.id);
          li.remove();
          if (!list.querySelector('.inv-item')) empty.style.display = 'block';
          badge.style.display = 'none';
          loadPartners();
        });
        li.querySelector('.reject-btn').addEventListener('click', async () => {
          await ipcRenderer.invoke('share:reject', inv.id);
          li.remove();
          if (!list.querySelector('.inv-item')) empty.style.display = 'block';
          badge.style.display = 'none';
        });
        list.appendChild(li);
      });
    }

    // ── 초대 보내기 ──
    document.getElementById('inviteBtn').addEventListener('click', async () => {
      const email = document.getElementById('inviteEmail').value.trim();
      const errEl = document.getElementById('inviteError');
      const sucEl = document.getElementById('inviteSuccess');
      errEl.style.display = 'none'; sucEl.style.display = 'none';
      if (!email) { errEl.textContent = '이메일을 입력해주세요.'; errEl.style.display = 'block'; return; }
      const result = await ipcRenderer.invoke('share:invite', email);
      if (result.ok) {
        document.getElementById('inviteEmail').value = '';
        sucEl.textContent = `${result.toUsername}(${result.toEmail})님에게 초대를 보냈습니다`;
        sucEl.style.display = 'block';
      } else if (result.notMember) {
        // 미가입자 → 가입 초대 이메일 여부 확인
        const confirm = await ipcRenderer.invoke('dialog:confirm',
          `${email}은(는) ModuShare에 가입되어 있지 않습니다.\n가입 초대 이메일을 보내시겠습니까?`
        );
        if (confirm) {
          const emailResult = await ipcRenderer.invoke('share:emailInvite', email);
          if (emailResult.ok) {
            document.getElementById('inviteEmail').value = '';
            sucEl.textContent = `${email}에게 가입 초대 이메일을 보냈습니다`;
            sucEl.style.display = 'block';
          } else {
            errEl.textContent = emailResult.error || '초대 이메일 전송 실패';
            errEl.style.display = 'block';
          }
        }
      } else {
        errEl.textContent = result.error || '초대 실패';
        errEl.style.display = 'block';
      }
    });

    // ── 히스토리 ──
    const statusLabel = { pending: '대기 중', accepted: '수락됨', rejected: '거절됨' };
    const statusColor = { pending: '#f59e0b', accepted: '#22c55e', rejected: '#ef4444' };

    async function loadHistory() {
      const result = await ipcRenderer.invoke('share:history');
      if (!result.ok) return;

      const sentList = document.getElementById('sentList');
      const sentEmpty = document.getElementById('sentEmpty');
      sentList.querySelectorAll('.hist-item').forEach(el => el.remove());
      const sent = result.sent || [];
      sentEmpty.style.display = sent.length === 0 ? 'block' : 'none';
      sent.forEach(inv => {
        const li = document.createElement('li');
        li.className = 'item hist-item';
        li.innerHTML = `
          <div class="info">
            <span class="name">${escHtml(inv.toUsername)}</span>
            <span class="email">${escHtml(inv.toEmail)}</span>
          </div>
          <span style="font-size:0.75rem;color:${statusColor[inv.status]||'#888'}">${statusLabel[inv.status]||inv.status}</span>
        `;
        sentList.appendChild(li);
      });

      const recvList = document.getElementById('receivedList');
      const recvEmpty = document.getElementById('receivedEmpty');
      recvList.querySelectorAll('.hist-item').forEach(el => el.remove());
      const received = result.received || [];
      recvEmpty.style.display = received.length === 0 ? 'block' : 'none';
      received.forEach(inv => {
        const li = document.createElement('li');
        li.className = 'item hist-item';
        li.innerHTML = `
          <div class="info">
            <span class="name">${escHtml(inv.fromUsername)}</span>
            <span class="email">${escHtml(inv.fromEmail)}</span>
          </div>
          <span style="font-size:0.75rem;color:${statusColor[inv.status]||'#888'}">${statusLabel[inv.status]||inv.status}</span>
        `;
        recvList.appendChild(li);
      });
    }

    // 히스토리 탭 클릭 시 로드
    document.querySelector('[data-tab="history"]').addEventListener('click', loadHistory);

    // ── 실시간 초대 알림 ──
    ipcRenderer.on('share:newInvitation', () => {
      loadInvitations();
    });

    loadPartners();
    loadInvitations();
  </script>
</body>
</html>
