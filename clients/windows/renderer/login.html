<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModuShare – Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 1.75rem; font-weight: 700; text-align: center; color: #1d1d1f; margin-bottom: 0.25rem; }
    .sub { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 1.75rem; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1rem; }
    label { font-size: 0.8rem; font-weight: 600; color: #444; }
    input {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #d1d1d6;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    button:disabled { background: #a5a6f6; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #dc2626;
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ModuShare</h1>
    <p class="sub">Sign in to sync your clipboard</p>

    <div class="error" id="error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" id="btn">Sign In</button>
    </form>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btn');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorEl.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const result = await ipcRenderer.invoke('auth:login', { email, password });

      if (result.ok) {
        window.close();
      } else {
        errorEl.textContent = result.error || 'Login failed';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
