# /etc/nginx/sites-available/modushare.extory.co.conf
# modushare 서비스 - 포트 3010으로 프록시

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name modushare.extory.co;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name modushare.extory.co;

    # SSL 인증서 (certbot 발급 후 경로 확인)
    ssl_certificate     /etc/letsencrypt/live/modushare.extory.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/modushare.extory.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 업로드 크기 제한 (이미지 전송 대비)
    client_max_body_size 20M;

    # ── 일반 HTTP API 및 정적 파일 ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 업그레이드 지원
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # WebSocket 연결 타임아웃 (동기화 keep-alive)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
