# /etc/nginx/sites-available/groupware.extory.co.conf
# 기존 groupware 서비스 - 포트 3001로 프록시
# 이미 설정되어 있다면 WebSocket 헤더만 확인하세요

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name groupware.extory.co;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name groupware.extory.co;

    ssl_certificate     /etc/letsencrypt/live/groupware.extory.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/groupware.extory.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
